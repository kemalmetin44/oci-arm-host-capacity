name: Oracle ARM Slot Checker
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  check-capacity:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: 'true'
    steps:
      - uses: actions/checkout@v4       # ← BU OLMALI EN BAŞTA
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Install dependencies
        run: composer install --no-dev
      - name: Run capacity check
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
        run: |
          echo "=== ENV CHECK ==="
          echo "USER_ID set: $([[ -n "$OCI_USER_ID" ]] && echo YES || echo NO)"
          echo "TENANCY set: $([[ -n "$OCI_TENANCY_ID" ]] && echo YES || echo NO)"
          echo "FINGERPRINT set: $([[ -n "$OCI_KEY_FINGERPRINT" ]] && echo YES || echo NO)"
          echo "PRIVATE_KEY set: $([[ -n "$OCI_PRIVATE_KEY" ]] && echo YES || echo NO)"
          echo "REGION set: $([[ -n "$OCI_REGION" ]] && echo YES || echo NO)"
          echo "SUBNET set: $([[ -n "$OCI_SUBNET_ID" ]] && echo YES || echo NO)"
          echo "IMAGE set: $([[ -n "$OCI_IMAGE_ID" ]] && echo YES || echo NO)"
          echo "SSH_KEY set: $([[ -n "$OCI_SSH_PUBLIC_KEY" ]] && echo YES || echo NO)"
          echo "OCPUS set: $([[ -n "$OCI_OCPUS" ]] && echo YES || echo NO)"
          echo "MEMORY set: $([[ -n "$OCI_MEMORY_IN_GBS" ]] && echo YES || echo NO)"
          echo "=== PHP OUTPUT ==="
          php index.php || true
          OUTPUT=$(php index.php 2>&1)
          echo "$OUTPUT"
          echo "output=$OUTPUT" >> $GITHUB_OUTPUT
          if echo "$OUTPUT" | grep -q "launchInstance"; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="✅ Oracle ARM instance OLUŞTURULDU! https://cloud.oracle.com/compute/instances"
          fi
