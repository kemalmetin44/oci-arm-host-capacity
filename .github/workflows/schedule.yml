name: Oracle ARM Slot Checker
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  check-capacity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Install dependencies
        run: composer install --no-dev
      - name: Run capacity check
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
        run: |
          echo "=== ENV CHECK ==="
          echo "USER_ID set: $([[ -n "$OCI_USER_ID" ]] && echo YES || echo NO)"
          echo "TENANCY set: $([[ -n "$OCI_TENANCY_ID" ]] && echo YES || echo NO)"
          echo "SUBNET set: $([[ -n "$OCI_SUBNET_ID" ]] && echo YES || echo NO)"
          echo "IMAGE set: $([[ -n "$OCI_IMAGE_ID" ]] && echo YES || echo NO)"
          echo "=== PHP OUTPUT ==="
          php index.php || true
